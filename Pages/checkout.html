<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Compra - SEAL HOUSE</title>
    <link rel="stylesheet" href="./css/CheckoutStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html"><img src="./src/img/logo.png" alt="Logo"></a>
            </div>
           
            <div class="user-actions">
                <div class="cart-icon">
                    <a href="shopping-car.html"><i class="fa-solid fa-cart-shopping"></i></a>
                    <span>1</span>
                </div>
                <a href="login.html"><i class="fa-solid fa-circle-user"></i></a>
            </div>
        </div>
    </header>

    

    <main class="content">
        <div class="confirmation-card">
            <div class="success-message">
                <div class="check-circle">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1>Compra realizada con éxito !</h1>
                <p>¡Gracias por su compra!<br>Tu pedido fue procesado correctamente</p>
            </div>

            <hr class="divider">

            <div class="order-info">
                <span><strong>ID del carrito:</strong> #ML45872</span>
                <span class="separator">|</span>
                <span><strong>Fecha:</strong> 12/Marzo / 2026</span>
                <span class="separator">|</span>
                <span><strong>Estado del pago:</strong> Aprobado</span>
            </div>

            <div class="product-table-header">
                <span>Producto</span>
                <div class="header-right">
                    <span>Cantidad</span>
                    <span>Precio</span>
                </div>
            </div>

            <div class="product-item">
                <div class="product-detail">
                    <img src="./src/img/image.png" alt="Buzo">
                    <span class="product-name">BUZO DE CUELLO REDONDO GRIS</span>
                </div>
                <div class="product-values">
                    <span class="qty">1</span>
                    <span class="price">$50.000</span>
                </div>
            </div>

            <div class="total-section">
                <p>Total pagado: <strong>$50.000</strong></p>
            </div>

            <button class="btn-home">Volver al inicio</button>
        </div>
    </main>

</body>
</html>
